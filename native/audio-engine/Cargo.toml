[package]
name = "audio-engine"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["napi6", "serde-json"] }
napi-derive = "2"
ffmpeg-next = { version = "8", default-features = false, features = ["codec", "format", "software-resampling", "static"] }
rodio = { version = "0.20", default-features = false }
parking_lot = "0.12"
anyhow = "1"
rustfft = "6"

[build-dependencies]
napi-build = "2"

[patch.crates-io]
ffmpeg-sys-next = { git = "https://github.com/apoint123/rust-ffmpeg-sys" }

[profile.release]
lto = true
strip = "symbols"
