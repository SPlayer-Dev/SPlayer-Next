name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm prettier --check .

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck
        env:
          SKIP_NATIVE_BUILD: true
